name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  publish-gallery:
    name: Publish to PowerShell Gallery
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module InvokeBuild, platyPS -Scope CurrentUser -Force

      - name: Build module
        shell: pwsh
        run: Invoke-Build Build

      - name: Publish to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: Invoke-Build Publish

  publish-github:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module InvokeBuild, Microsoft.PowerShell.PSResourceGet -Scope CurrentUser -Force

      - name: Build module
        shell: pwsh
        run: Invoke-Build Build

      - name: Publish to GitHub Packages
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: Invoke-Build PublishGitHub

  publish-ado:
    name: Publish to Azure DevOps Artifacts
    runs-on: ubuntu-latest
    environment: release
    if: vars.ADO_ORG != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module InvokeBuild, Microsoft.PowerShell.PSResourceGet -Scope CurrentUser -Force

      - name: Build module
        shell: pwsh
        run: Invoke-Build Build

      - name: Publish to ADO Artifacts
        shell: pwsh
        env:
          ADO_PAT:  ${{ secrets.ADO_PAT }}
          ADO_ORG:  ${{ vars.ADO_ORG }}
          ADO_FEED: ${{ vars.ADO_FEED }}
        run: Invoke-Build PublishADO
