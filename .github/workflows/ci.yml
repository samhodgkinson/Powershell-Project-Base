name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module InvokeBuild, PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Lint
        shell: pwsh
        run: Invoke-Build Lint

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module InvokeBuild, Pester -Scope CurrentUser -Force -MinimumVersion @{Pester='5.0'}

      - name: Test
        shell: pwsh
        run: Invoke-Build Test

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: .build/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: .build/testresults.xml

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Security scan
        shell: pwsh
        run: |
          $rules = @(
            'PSAvoidUsingInvokeExpression',
            'PSAvoidUsingConvertToSecureStringWithPlainText',
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingUsernameAndPasswordParams',
            'PSAvoidUsingComputerNameHardcoded',
            'PSAvoidUsingWMICmdlet'
          )
          $results = Invoke-ScriptAnalyzer -Path ./src -Recurse -IncludeRule $rules
          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
            exit 1
          }

  build:
    name: Build & Docs
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module InvokeBuild, PSScriptAnalyzer, platyPS -Scope CurrentUser -Force

      - name: Build
        shell: pwsh
        run: Invoke-Build Build

      - name: Docs
        shell: pwsh
        run: Invoke-Build Docs

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: module-package
          path: .build/MyModule/

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/
