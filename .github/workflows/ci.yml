name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./src -Settings ./PSScriptAnalyzerSettings.psd1 -Recurse -ReportSummary
          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
            exit 1
          }

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -MinimumVersion 5.0

      - name: Run tests with coverage
        shell: pwsh
        run: |
          $null = New-Item .build -ItemType Directory -Force
          $config = New-PesterConfiguration
          $config.Run.Path           = './tests'
          $config.Run.Exit           = $true
          $config.Output.Verbosity   = 'Detailed'
          $config.CodeCoverage.Enabled        = $true
          $config.CodeCoverage.Path           = './src'
          $config.CodeCoverage.UseBreakpoints = $false
          $config.CodeCoverage.OutputFormat   = 'JaCoCo'
          $config.CodeCoverage.OutputPath     = '.build/coverage.xml'
          $config.TestResult.Enabled          = $true
          $config.TestResult.OutputFormat     = 'JUnitXml'
          $config.TestResult.OutputPath       = '.build/testresults.xml'
          Invoke-Pester -Configuration $config

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          files: .build/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: .build/testresults.xml

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer security rules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          $securityRules = @(
            'PSAvoidUsingInvokeExpression',
            'PSAvoidUsingConvertToSecureStringWithPlainText',
            'PSAvoidUsingPlainTextForPassword',
            'PSAvoidUsingUsernameAndPasswordParams',
            'PSAvoidUsingComputerNameHardcoded',
            'PSAvoidUsingWMICmdlet'
          )
          $results = Invoke-ScriptAnalyzer -Path ./src -Recurse -IncludeRule $securityRules
          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
            exit 1
          }

  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module InvokeBuild, platyPS -Scope CurrentUser -Force

      - name: Build and generate docs
        shell: pwsh
        run: Invoke-Build Build, Docs

      - name: Upload module artifact
        uses: actions/upload-artifact@v4
        with:
          name: module-package
          path: .build/MyModule/
